services:
  - type: keyvalue
    name: ngs-medusa-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off
    ipAllowList: []

  - type: web
    name: ngs-medusa-backend
    runtime: node
    plan: free
    region: frankfurt
    repo: https://github.com/borjadm18/ngs-medusa-b2b
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install --frozen-lockfile --prod=false && pnpm --filter @b2b-starter/backend build && cd apps/backend/.medusa/server && pnpm install --prod --no-frozen-lockfile
    initialDeployHook: cd apps/backend && pnpm medusa exec ./src/migration-scripts/initial-data-seed.ts
    startCommand: cd apps/backend/.medusa/server && pnpm medusa db:migrate --execute-safe-links && cd ../.. && (timeout 120s pnpm medusa exec ./src/migration-scripts/seed-b2b-demo-data.ts || true) && cd .medusa/server && if [ -n "$NGS_ADMIN_PASSWORD" ]; then pnpm medusa user -e "${NGS_ADMIN_EMAIL:-admin@ngs.local}" -p "$NGS_ADMIN_PASSWORD" || true; fi && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.19.0
      - key: PORT
        value: 10000
      - key: MEDUSA_FF_INDEX_ENGINE
        value: "false"
      - key: STORE_CORS
        value: http://localhost:8000,https://ngs-medusa-poc-vercel.vercel.app,https://storefront-virid-three-41.vercel.app,https://storefront-borjadm18-borjadm18s-projects.vercel.app,https://storefront-p6oyms4g2-borjadm18s-projects.vercel.app
      - key: ADMIN_CORS
        value: https://ngs-medusa-backend.onrender.com,https://dashboard.render.com
      - key: AUTH_CORS
        value: https://ngs-medusa-backend.onrender.com,https://dashboard.render.com
      - key: MEDUSA_BACKEND_URL
        value: https://ngs-medusa-backend.onrender.com
      - key: VITE_STOREFRONT_URL
        value: https://storefront-virid-three-41.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: ngs-medusa-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ngs-medusa-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true

databases:
  - name: ngs-medusa-postgres
    databaseName: ngs_medusa
    user: ngs_medusa
    plan: free
    region: frankfurt
    postgresMajorVersion: "15"
    ipAllowList: []

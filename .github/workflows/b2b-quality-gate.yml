name: B2B Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-quality:
    name: Backend build and B2B ownership tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: medusa
          POSTGRES_PASSWORD: medusa
          POSTGRES_DB: medusa_b2b_starter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medusa -d medusa_b2b_starter_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: true
      NODE_ENV: test
      STORE_CORS: http://localhost:8000
      ADMIN_CORS: http://localhost:5173,http://localhost:9000
      AUTH_CORS: http://localhost:5173,http://localhost:9000
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_jwt_secret_change_me
      COOKIE_SECRET: test_cookie_secret_change_me
      DATABASE_URL: postgres://medusa:medusa@localhost:5432/medusa_b2b_starter_test
      DB_HOST: localhost
      DB_USERNAME: medusa
      DB_PASSWORD: medusa
      DB_PORT: 5432
      DB_NAME: medusa_b2b_starter_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm@9.15.0 --config.engine-strict=false install --frozen-lockfile --prod=false

      - name: Validate generated storefront safety checks
        run: |
          corepack pnpm@9.15.0 --config.engine-strict=false validate:storefront-debug-logs
          corepack pnpm@9.15.0 --config.engine-strict=false validate:client-profiles

      - name: Build backend
        run: corepack pnpm@9.15.0 --config.engine-strict=false --filter @b2b-starter/backend build

      - name: Run company ownership HTTP test
        working-directory: apps/backend
        run: corepack pnpm@9.15.0 --config.engine-strict=false exec node scripts/run-jest.mjs integration:http integration-tests/http/companies/companies.spec.ts

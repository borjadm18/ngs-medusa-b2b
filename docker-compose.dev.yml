services:
  postgres:
    image: postgres:15-alpine
    container_name: medusa-b2b-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa_b2b_starter
    ports:
      - "5432:5432"
    volumes:
      - medusa_b2b_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa_b2b_starter"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: medusa-b2b-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - medusa_b2b_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  medusa_b2b_postgres:
  medusa_b2b_redis:
